name: Sync Token Images

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-images:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger sync for all chains
      run: |
        BASE_URL="https://token-images.euler.finance/sync"

        CHAINS=(
          "1"       # Ethereum
          "42161"   # Arbitrum
          "8453"    # Base
          "43114"   # Avalanche
          "56"      # BSC
          "146"     # Sonic
          "1923"    # Sonic Blaze
          "80094"   # Berachain
          "60808"   # Bob
          "130"     # Unichain
          "59144"   # Linea
          "5000"    # Mantle
          "1868"    # Swell
          "2741"    # TAC
          "57073"   # Ink
          "2911"    # HyperEVM
          "10143"   # Monad
        )

        FAILED=0

        for CHAIN_ID in "${CHAINS[@]}"; do
          echo "Syncing chain ${CHAIN_ID}..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" "${BASE_URL}/${CHAIN_ID}")

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "  Chain ${CHAIN_ID}: OK"
          elif [ "$HTTP_CODE" -eq 429 ]; then
            echo "  Chain ${CHAIN_ID}: Rate limited (already syncing)"
          else
            echo "  Chain ${CHAIN_ID}: Failed (HTTP ${HTTP_CODE})"
            cat /tmp/response.json
            FAILED=$((FAILED + 1))
          fi

          # Wait 2 minutes between requests to avoid rate limits
          sleep 120
        done

        if [ "$FAILED" -gt 0 ]; then
          echo "::warning::${FAILED} chain(s) failed to sync"
        fi

    - name: Output summary
      if: always()
      run: |
        echo "## Sync Token Images" >> $GITHUB_STEP_SUMMARY
        echo "Triggered sync for all supported chains via https://token-images.euler.finance" >> $GITHUB_STEP_SUMMARY
